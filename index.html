<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tody Trick - Brutal VIP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030303; /* Preto quase puro */
        }

        /* ========================================================
           TELA DE BOAS-VINDAS / ENTRADA BRUTAL
           ======================================================== */
        #telaLogin {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #030303;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .login-title {
            color: #fff;
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); /* Glow Vermelho */
        }

        .login-box {
            width: 85%;
            max-width: 330px;
            background-color: #0a0a0a; /* Preto ligeiramente mais claro */
            border: 2px solid #b30000; /* Vermelho Escuro Escovado */
            border-radius: 10px; /* Bordas mais quadradas */
            padding: 40px 20px;
            box-shadow: 0 0 30px rgba(179, 0, 0, 0.4);
            text-align: center;
        }

        .welcome-text {
            color: #b0b0b0;
            font-size: 13px;
            margin-bottom: 30px;
            font-family: sans-serif;
            font-weight: bold;
            line-height: 1.6;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #b30000, #4a0000); /* Degradê Vermelho Sangue */
            border: none;
            color: #fff;
            border-radius: 6px;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            box-shadow: 0 4px 15px rgba(179, 0, 0, 0.5);
            transition: transform 0.1s;
        }

        .login-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(179, 0, 0, 0.3);
        }

        /* ========================================================
           PAINEL PRINCIPAL BRUTAL
           ======================================================== */
        .info-click {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(179, 0, 0, 0.5);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 1;
        }

        .panel-container {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 360px;
            background-color: #080808;
            border: 2px solid #b30000;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(179, 0, 0, 0.4);
            overflow: hidden;
            z-index: 10;
        }

        .panel-header {
            background: linear-gradient(135deg, #4a0000, #000000);
            padding: 18px;
            text-align: center;
            color: #fff;
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            border-bottom: 1px solid rgba(179, 0, 0, 0.3);
        }

        .panel-tabs {
            display: flex;
            background-color: #050505;
            border-bottom: 2px solid #b30000;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 5px;
            background: none;
            border: none;
            color: #808080;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #fff;
            background-color: #080808;
            border-bottom: 3px solid #b30000;
            text-shadow: 0 0 8px rgba(179, 0, 0, 0.7);
        }

        .panel-content {
            padding: 22px;
            min-height: 220px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #050505;
            padding: 14px 18px;
            border-radius: 6px;
            margin-bottom: 14px;
            border: 1px solid rgba(179, 0, 0, 0.15);
        }

        .option-title {
            color: #e0e0e0;
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #1a1a1a;
            transition: .3s;
            border-radius: 26px;
            border: 1px solid #333;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 3px;
            background-color: #666;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #b30000;
            box-shadow: 0 0 12px rgba(179, 0, 0, 0.6);
            border-color: #b30000;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #fff;
        }

        .inject-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 1px solid #b30000;
            color: #b30000;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 14px;
            text-transform: uppercase;
            text-shadow: 0 0 6px rgba(179, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .inject-btn:active {
            transform: scale(0.98);
            background: #b30000;
            color: #fff;
            box-shadow: 0 0 15px rgba(179, 0, 0, 0.6);
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="login-title">TODY TRICK</div>
        <div class="login-box">
            <div class="welcome-text">ACESSO RESTRITO.<br>PAINEL BRUTAL ATIVADO.<br>CLIQUE ABAIXO PARA ENTRAR.</div>
            <button class="login-btn" onclick="entrarDireto()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div class="info-click">3 CLIQUES RÁPIDOS NA TELA PARA ABRIR/FECHAR</div>

    <div class="panel-container" id="menuPainel">
        <div class="panel-header">TODY TRICK BRUTAL</div>
        
        <div class="panel-tabs">
            <button class="tab-btn active" onclick="mudarAba('aimbot')">AIMBOT</button>
            <button class="tab-btn" onclick="mudarAba('otimizacao')">OTIMIZAÇÃO</button>
            <button class="tab-btn" onclick="mudarAba('config')">CONFIG</button>
        </div>

        <div class="panel-content">
            <div id="aimbot" class="tab-content active">
                <div class="option-row">
                    <span class="option-title">Aimbot Vip 90%</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">Recuo Vip 90%</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">AimFOV VIP 90%</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">Aumentar Precisão VIP</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>

            <div id="otimizacao" class="tab-content">
                <div class="option-row">
                    <span class="option-title">Diminuir Lag</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">Otimizar Jogo</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">Latência</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
                <div class="option-row">
                    <span class="option-title">Aumentar FPS (VIP)</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>

            <div id="config" class="tab-content">
                <button class="inject-btn" onclick="injetarCheat(event, 'FREE FIRE NORMAL')">INJETAR FREE FIRE NORMAL</button>
                <button class="inject-btn" onclick="injetarCheat(event, 'FREE FIRE MAX')">INJETAR FREE FIRE MAX</button>
            </div>
        </div>
    </div>

    <script>
        function entrarDireto() {
            let tLogin = document.getElementById("telaLogin");
            tLogin.style.opacity = "0";
            setTimeout(() => { 
                tLogin.style.display = "none"; 
                document.getElementById('menuPainel').style.display = 'block';
            }, 500);
        }

        let cliques = 0;
        let timer;
        window.addEventListener('click', (e) => {
            if (document.getElementById("telaLogin").style.display !== "none") return;
            if (e.target.closest('.panel-container')) return;
            cliques++;
            clearTimeout(timer);
            timer = setTimeout(() => { cliques = 0; }, 400);
            if (cliques === 3) {
                let p = document.getElementById('menuPainel');
                p.style.display = (p.style.display === 'block') ? 'none' : 'block';
                cliques = 0;
            }
        });

        function mudarAba(idAba) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(idAba).classList.add('active');
            event.target.classList.add('active');
        }

        function injetarCheat(e, tipoFf) {
            let btn = e.target;
            let originalText = btn.innerText;
            btn.disabled = true;
            btn.innerText = "INJETANDO EM " + tipoFf + "...";
            btn.style.borderColor = "#ff9900"; /* Laranja Alerta */
            btn.style.color = "#ff9900";
            
            setTimeout(() => {
                btn.innerText = "INJETADO COM SUCESSO!";
                btn.style.borderColor = "#00ff00"; /* Verde Sucesso */
                btn.style.color = "#00ff00";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.style.borderColor = "#b30000"; /* De volta pro Vermelho */
                    btn.style.color = "#b30000";
                }, 2000);
            }, 2500);
        }
    </script>
</body>
</html>
